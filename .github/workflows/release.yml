name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64
  # ---------------------------------------------------------------------------
  build-linux-x64:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autotools-dev autopoint libtool pkg-config \
            gettext \
            libssl-dev libc-ares-dev zlib1g-dev libsqlite3-dev \
            libssh2-1-dev libexpat1-dev
      - name: Build
        run: |
          autoreconf -i
          ./configure \
            --without-gnutls --with-openssl \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --disable-nls \
            CXXFLAGS="-O2" CFLAGS="-O2" \
            LDFLAGS="-static-libstdc++"
          make -j"$(nproc)"
          strip src/aria2c
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-linux-x86_64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          cp doc/bash_completion/aria2c "${DIRNAME}/aria2c.bash_completion" || true
          tar cJf "${DIRNAME}.tar.xz" "${DIRNAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: aria2-*-linux-x86_64.tar.xz

  # ---------------------------------------------------------------------------
  # Linux ARM64
  # ---------------------------------------------------------------------------
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autotools-dev autopoint libtool pkg-config \
            gettext \
            libssl-dev libc-ares-dev zlib1g-dev libsqlite3-dev \
            libssh2-1-dev libexpat1-dev
      - name: Build
        run: |
          autoreconf -i
          ./configure \
            --without-gnutls --with-openssl \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --disable-nls \
            CXXFLAGS="-O2" CFLAGS="-O2" \
            LDFLAGS="-static-libstdc++"
          make -j"$(nproc)"
          strip src/aria2c
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-linux-aarch64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          cp doc/bash_completion/aria2c "${DIRNAME}/aria2c.bash_completion" || true
          tar cJf "${DIRNAME}.tar.xz" "${DIRNAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: aria2-*-linux-aarch64.tar.xz

  # ---------------------------------------------------------------------------
  # macOS ARM64 (Apple Silicon)
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config gettext \
            c-ares libssh2 sqlite3 openssl
      - name: Build
        run: |
          autoreconf -i
          ./configure \
            --without-openssl --without-gnutls --with-appletls \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --disable-nls \
            CXXFLAGS="-O2" CFLAGS="-O2"
          make -j"$(sysctl -n hw.ncpu)"
          strip src/aria2c
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-macos-arm64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          tar cjf "${DIRNAME}.tar.bz2" "${DIRNAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: aria2-*-macos-arm64.tar.bz2

  # ---------------------------------------------------------------------------
  # macOS Intel (x86_64)
  # ---------------------------------------------------------------------------
  build-macos-intel:
    name: macOS Intel
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config gettext \
            c-ares libssh2 sqlite3 openssl
      - name: Build
        run: |
          autoreconf -i
          ./configure \
            --without-openssl --without-gnutls --with-appletls \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --disable-nls \
            CXXFLAGS="-O2" CFLAGS="-O2"
          make -j"$(sysctl -n hw.ncpu)"
          strip src/aria2c
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-macos-x86_64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          tar cjf "${DIRNAME}.tar.bz2" "${DIRNAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: aria2-*-macos-x86_64.tar.bz2

  # ---------------------------------------------------------------------------
  # Windows x86_64 (cross-compiled on Ubuntu, following Dockerfile.mingw)
  # ---------------------------------------------------------------------------
  build-windows-x64:
    name: Windows x86_64
    runs-on: ubuntu-24.04
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: /usr/local/x86_64-w64-mingw32
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils autoconf automake autotools-dev autopoint libtool \
            patch ca-certificates pkg-config curl dpkg-dev lzip gettext \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Download dependencies
        run: |
          curl -L -O https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          curl -L -O https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.bz2
          curl -L -O https://www.sqlite.org/2023/sqlite-autoconf-3430100.tar.gz
          curl -L -O https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
          curl -L -O https://github.com/c-ares/c-ares/releases/download/cares-1_19_1/c-ares-1.19.1.tar.gz
          curl -L -O https://libssh2.org/download/libssh2-1.11.0.tar.bz2

      - name: Build gmp
        run: |
          tar xf gmp-6.3.0.tar.xz && cd gmp-6.3.0
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --disable-cxx --enable-fat \
            CFLAGS="-mtune=generic -O2 -g0"
          sudo make -j$(nproc) install

      - name: Build expat
        run: |
          tar xf expat-2.5.0.tar.bz2 && cd expat-2.5.0
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build sqlite3
        run: |
          tar xf sqlite-autoconf-3430100.tar.gz && cd sqlite-autoconf-3430100
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build zlib
        run: |
          tar xf zlib-1.3.1.tar.gz && cd zlib-1.3.1
          CC=$HOST-gcc AR=$HOST-ar LD=$HOST-ld \
          RANLIB=$HOST-ranlib STRIP=$HOST-strip \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo make -j$(nproc) install

      - name: Build c-ares
        run: |
          tar xf c-ares-1.19.1.tar.gz && cd c-ares-1.19.1
          ./configure \
            --disable-shared --enable-static --without-random \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32"
          sudo make -j$(nproc) install

      - name: Build libssh2
        run: |
          tar xf libssh2-1.11.0.tar.bz2 && cd libssh2-1.11.0
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32"
          sudo make -j$(nproc) install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --without-included-gettext --disable-nls \
            --with-libcares --without-gnutls --without-openssl \
            --with-sqlite3 --without-libxml2 --with-libexpat \
            --with-libz --with-libgmp --with-libssh2 \
            --without-libgcrypt --without-libnettle \
            ARIA2_STATIC=yes \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG="/usr/bin/pkg-config" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          $HOST-strip src/aria2c.exe

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-windows-x86_64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c.exe "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: aria2-*-windows-x86_64.zip

  # ---------------------------------------------------------------------------
  # Windows ARM64 (cross-compiled on Ubuntu with llvm-mingw)
  # ---------------------------------------------------------------------------
  build-windows-arm64:
    name: Windows ARM64
    runs-on: ubuntu-24.04
    env:
      HOST: aarch64-w64-mingw32
      PREFIX: /usr/local/aarch64-w64-mingw32
      LLVM_MINGW_VER: "20250114"
    steps:
      - uses: actions/checkout@v4

      - name: Install llvm-mingw toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils autoconf automake autotools-dev autopoint libtool \
            patch ca-certificates pkg-config curl dpkg-dev lzip gettext
          curl -L -O https://github.com/mstorsjo/llvm-mingw/releases/download/$LLVM_MINGW_VER/llvm-mingw-$LLVM_MINGW_VER-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar xf llvm-mingw-$LLVM_MINGW_VER-ucrt-ubuntu-20.04-x86_64.tar.xz
          echo "$PWD/llvm-mingw-$LLVM_MINGW_VER-ucrt-ubuntu-20.04-x86_64/bin" >> $GITHUB_PATH

      - name: Download dependencies
        run: |
          curl -L -O https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          curl -L -O https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.bz2
          curl -L -O https://www.sqlite.org/2023/sqlite-autoconf-3430100.tar.gz
          curl -L -O https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
          curl -L -O https://github.com/c-ares/c-ares/releases/download/cares-1_19_1/c-ares-1.19.1.tar.gz
          curl -L -O https://libssh2.org/download/libssh2-1.11.0.tar.bz2

      - name: Build gmp
        run: |
          tar xf gmp-6.3.0.tar.xz && cd gmp-6.3.0
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --disable-cxx --disable-assembly \
            CFLAGS="-O2 -g0"
          sudo make -j$(nproc) install

      - name: Build expat
        run: |
          tar xf expat-2.5.0.tar.bz2 && cd expat-2.5.0
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build sqlite3
        run: |
          tar xf sqlite-autoconf-3430100.tar.gz && cd sqlite-autoconf-3430100
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build zlib
        run: |
          tar xf zlib-1.3.1.tar.gz && cd zlib-1.3.1
          CC=$HOST-gcc AR=$HOST-ar LD=$HOST-ld \
          RANLIB=$HOST-ranlib STRIP=$HOST-strip \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo make -j$(nproc) install

      - name: Build c-ares
        run: |
          tar xf c-ares-1.19.1.tar.gz && cd c-ares-1.19.1
          ./configure \
            --disable-shared --enable-static --without-random \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32"
          sudo make -j$(nproc) install

      - name: Build libssh2
        run: |
          tar xf libssh2-1.11.0.tar.bz2 && cd libssh2-1.11.0
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32"
          sudo make -j$(nproc) install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --without-included-gettext --disable-nls \
            --with-libcares --without-gnutls --without-openssl \
            --with-sqlite3 --without-libxml2 --with-libexpat \
            --with-libz --with-libgmp --with-libssh2 \
            --without-libgcrypt --without-libnettle \
            ARIA2_STATIC=yes \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG="/usr/bin/pkg-config" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          $HOST-strip src/aria2c.exe

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-windows-arm64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c.exe "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: aria2-*-windows-arm64.zip

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-intel
      - build-windows-x64
      - build-windows-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum aria2-* > ../checksums.sha256
          cd ..
          mv checksums.sha256 "artifacts/aria2-${GITHUB_REF_NAME#v}-checksums.sha256"

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
